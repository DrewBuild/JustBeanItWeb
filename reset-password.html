<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reset your Just Bean It account password."
    />
    <title>Reset your password | Just Bean It</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Supabase password reset redirect target:
    Add this URL in Supabase Dashboard:
    Authentication → URL Configuration → Redirect URLs

    https://justbeanit.vercel.app/reset-password.html
    -->
    <main class="confirmed-page">
      <section
        class="confirmation-card reset-card"
        aria-labelledby="reset-title"
      >
        <img class="confirmation-logo" src="logo.png" alt="Just Bean It logo" />

        <div id="reset-form-view">
          <p class="eyebrow">Just Bean It</p>
          <h1 id="reset-title">Reset your password</h1>
          <p class="tagline">
            Choose a new password for your Just Bean It account.
          </p>

          <form class="reset-form" id="reset-password-form" novalidate>
            <div class="form-field">
              <label for="new-password">New password</label>
              <input
                id="new-password"
                name="new-password"
                type="password"
                autocomplete="new-password"
                required
                minlength="8"
              />
            </div>

            <div class="form-field">
              <label for="confirm-password">Confirm new password</label>
              <input
                id="confirm-password"
                name="confirm-password"
                type="password"
                autocomplete="new-password"
                required
                minlength="8"
              />
            </div>

            <p class="form-message" id="reset-message" role="status"></p>

            <button class="button button-primary" type="submit">
              Update Password
            </button>
          </form>
        </div>

        <div class="success-view" id="reset-success-view" hidden>
          <div class="check-mark" aria-hidden="true">✓</div>
          <p class="eyebrow">Just Bean It</p>
          <h1>Password updated.</h1>
          <p>
            You can now head back to the Just Bean It app and log in with your
            new password.
          </p>
          <!-- TODO: Replace with final app deep link once configured. -->
          <a class="button button-primary" href="justbeanit://login">
            Back to Just Bean It
          </a>
        </div>
      </section>
    </main>

    <script type="module" src="reset-password.js"></script>
  </body>
</html>
